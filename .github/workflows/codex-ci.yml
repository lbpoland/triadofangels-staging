name: Codex CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci

      - name: Run Dev Check
        run: node tools/dev-check.mjs --ci

      - name: Run Link Scan
        run: node tools/link-scan.mjs

      # Optional: Lighthouse CI (configure if you have LHCI setup)
      - name: Run Lighthouse CI
        run: lhci autorun
