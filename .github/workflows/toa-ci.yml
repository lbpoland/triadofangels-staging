name: TOA CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci-validate:
    name: ci-validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CI validate
        run: npm run ci:validate

  runtime:
    name: runtime
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npm run pw:install:chromium

      - name: Run runtime validation
        run: npm run ci:validate:runtime
