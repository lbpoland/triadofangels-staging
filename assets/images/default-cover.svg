<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-label="Triad of Angels default cover">
  <defs>
    <radialGradient id="g" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#1a1f2b"/>
      <stop offset="55%" stop-color="#0b0c10"/>
      <stop offset="100%" stop-color="#05060a"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#d7e1ff" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#7aa2ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#b6ffd7" stop-opacity="0.65"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="url(#g)"/>

  <!-- subtle star field -->
  <g fill="#ffffff" opacity="0.22">
    <circle cx="124" cy="182" r="2"/>
    <circle cx="246" cy="96" r="1.5"/>
    <circle cx="312" cy="276" r="1.8"/>
    <circle cx="1086" cy="204" r="1.6"/>
    <circle cx="980" cy="132" r="2.2"/>
    <circle cx="942" cy="318" r="1.4"/>
    <circle cx="106" cy="942" r="1.7"/>
    <circle cx="210" cy="1034" r="2.1"/>
    <circle cx="352" cy="954" r="1.5"/>
    <circle cx="1048" cy="996" r="2"/>
    <circle cx="948" cy="1068" r="1.6"/>
    <circle cx="880" cy="918" r="1.9"/>
  </g>

  <!-- triad emblem -->
  <g filter="url(#glow)">
    <circle cx="600" cy="600" r="420" fill="none" stroke="url(#stroke)" stroke-opacity="0.35" stroke-width="6"/>
    <circle cx="600" cy="600" r="300" fill="none" stroke="url(#stroke)" stroke-opacity="0.35" stroke-width="5"/>

    <path d="M600 260 L900 820 L300 820 Z" fill="none" stroke="url(#stroke)" stroke-width="10" stroke-linejoin="round"/>
    <path d="M600 330 L840 780 L360 780 Z" fill="none" stroke="url(#stroke)" stroke-opacity="0.55" stroke-width="6" stroke-linejoin="round"/>

    <!-- inner triad nodes -->
    <g fill="#d7e1ff" opacity="0.9">
      <circle cx="600" cy="370" r="10"/>
      <circle cx="790" cy="705" r="10"/>
      <circle cx="410" cy="705" r="10"/>
    </g>

    <!-- central sigil -->
    <path d="M600 500
             C630 500 656 524 656 555
             C656 586 630 610 600 610
             C570 610 544 586 544 555
             C544 524 570 500 600 500 Z"
          fill="none" stroke="url(#stroke)" stroke-width="8"/>
    <path d="M600 610 L600 720" stroke="url(#stroke)" stroke-width="8" stroke-linecap="round"/>
    <path d="M560 650 L640 650" stroke="url(#stroke)" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- label -->
  <g font-family="Montserrat, Arial, sans-serif" text-anchor="middle">
    <text x="600" y="1040" font-size="48" fill="#d7e1ff" opacity="0.92" letter-spacing="2">TRIAD OF ANGELS</text>
    <text x="600" y="1095" font-size="28" fill="#b6ffd7" opacity="0.75" letter-spacing="3">TOA STUDIOS</text>
  </g>
</svg>